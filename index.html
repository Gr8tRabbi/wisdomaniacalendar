<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisdomania 2026</title>

<link rel="manifest" href="manifest.json">

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }
header { background:black; color:gold; text-align:center; padding:15px; }
button { background:gold; border:none; padding:8px; font-weight:bold; }
.controls { display:flex; justify-content:space-between; padding:10px; }
.calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; padding:8px; }
.day { background:#1c1c1c; padding:6px; font-size:11px; border-radius:6px; }
.dashboard { background:#000; padding:10px; margin:10px; border-radius:8px; }
.market { color:gold; font-weight:bold; }
input { width:100%; font-size:10px; margin-top:2px; }
</style>
</head>

<body>

<header>
<h2>WISDOMANIA ALIGNMENT 2026</h2>
<div id="monthLabel"></div>
</header>

<div class="dashboard">
Monthly Income: ₦ <span id="monthlyIncome">0</span><br>
Monthly Savings: ₦ <span id="monthlySavings">0</span><br>
Year Income: ₦ <span id="yearIncome">0</span><br>
Year Savings: ₦ <span id="yearSavings">0</span>
</div>

<div class="controls">
<button onclick="prevMonth()">◀</button>
<button onclick="nextMonth()">▶</button>
</div>

<div class="calendar" id="calendar"></div>

<script>

const marketDays = ["Orie","Afor","Nkwo","Eke"];
let currentMonth = 0;

function calculateMarketIndex(month, day) {
    const start = new Date(2026,0,1);
    const current = new Date(2026,month,day);
    const diff = Math.floor((current-start)/(1000*60*60*24));
    return diff % 4;
}

function renderCalendar(){
    const cal = document.getElementById("calendar");
    cal.innerHTML = "";

    const label = document.getElementById("monthLabel");
    label.innerText = new Date(2026,currentMonth)
        .toLocaleString('default',{month:'long'}) + " 2026";

    const firstDay = new Date(2026,currentMonth,1).getDay();
    const daysInMonth = new Date(2026,currentMonth+1,0).getDate();

    for(let i=0;i<firstDay;i++){ 
        cal.appendChild(document.createElement("div"));
    }

    for(let d=1; d<=daysInMonth; d++){ 

        const idx = calculateMarketIndex(currentMonth,d);
        const div = document.createElement("div");
        div.className="day";

        const incomeKey = `income-${currentMonth}-${d}`;
        const savingsKey = `savings-${currentMonth}-${d}`;

        div.innerHTML=`
        <strong>${d}</strong><br>
        <span class="market">${marketDays[idx]}</span><br>
        ₦ Income:
        <input type="number" value="${localStorage.getItem(incomeKey)||''}"
        onchange="localStorage.setItem('${incomeKey}',this.value); updateTotals();">
        ₦ Savings:
        <input type="number" value="${localStorage.getItem(savingsKey)||''}"
        onchange="localStorage.setItem('${savingsKey}',this.value); updateTotals();">
        `;

        cal.appendChild(div);
    }

    updateTotals();
}

function updateTotals(){
    let monthlyIncome=0;
    let monthlySavings=0;
    let yearIncome=0;
    let yearSavings=0;

    for(let m=0;m<12;m++){ 
        const days=new Date(2026,m+1,0).getDate();
        for(let d=1; d<=days; d++){ 
            const income=Number(localStorage.getItem(`income-${m}-${d}`)||0);
            const savings=Number(localStorage.getItem(`savings-${m}-${d}`)||0);

            yearIncome+=income;
            yearSavings+=savings;

            if(m===currentMonth){
                monthlyIncome+=income;
                monthlySavings+=savings;
            }
        }
    }

    document.getElementById("monthlyIncome").innerText=monthlyIncome;
    document.getElementById("monthlySavings").innerText=monthlySavings;
    document.getElementById("yearIncome").innerText=yearIncome;
    document.getElementById("yearSavings").innerText=yearSavings;
}

function nextMonth(){ if(currentMonth<11){ currentMonth++; renderCalendar(); } }
function prevMonth(){ if(currentMonth>0){ currentMonth--; renderCalendar(); } }

renderCalendar();

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
